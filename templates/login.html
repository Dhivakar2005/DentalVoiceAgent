<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smile Dental | Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@300;400;700;800&family=Pacifico&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #f5d142;     /* Vibrant Editorial Yellow */
            --bg: #080808;
            --bg2: #0d0d0d;
            --border: rgba(255, 255, 255, 0.08);
            --white: #ffffff;
            --white-dim: rgba(255, 255, 255, 0.6);
            --white-faint: rgba(255, 255, 255, 0.1);
            --transition: 0.5s cubic-bezier(0.19, 1, 0.22, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            cursor: none;
        }

        /* ── CURSOR ── */
        #cursor {
            position: fixed;
            width: 10px; height: 10px;
            background: var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            transition: transform 0.08s, width 0.3s, height 0.3s;
            mix-blend-mode: exclusion;
            box-shadow: 0 0 15px rgba(245, 209, 66, 0.3);
        }
        #cursorTrail {
            position: fixed;
            width: 50px; height: 50px;
            background: transparent;
            border: 2px solid var(--accent);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99998;
            transform: translate(-50%, -50%);
            transition: transform 0.15s cubic-bezier(0.23, 1, 0.32, 1);
            mix-blend-mode: exclusion;
            opacity: 0.5;
        }

        /* Ambient Background */
        body::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            top: -200px; right: -200px;
            pointer-events: none;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 20px;
            position: relative;
            z-index: 10;
        }

        .brand {
            text-align: center;
            margin-bottom: 40px;
        }
        .brand svg {
            color: var(--accent);
            margin-bottom: 16px;
        }
        .brand h1 {
            font-family: 'Pacifico', cursive;
            font-size: 2rem;
            letter-spacing: -0.02em;
        }
        .brand h1 em {
            color: var(--accent);
            font-style: normal;
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(40px) saturate(180%);
            -webkit-backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid var(--border);
            padding: 64px 48px;
            border-radius: 4px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }
        .auth-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent), transparent);
            opacity: 0.4;
        }

        .tabs {
            display: flex;
            gap: 32px;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--border);
        }
        .tab {
            padding-bottom: 12px;
            font-family: 'Righteous', cursive;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.2rem;
            color: var(--white-dim);
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
        }
        .tab.active {
            color: var(--accent);
        }
        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px; left: 0; right: 0;
            height: 2px;
            background: var(--accent);
        }

        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--white-dim);
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 18px 20px;
            color: var(--white);
            font-size: 0.95rem;
            font-family: 'Nunito', sans-serif;
            outline: none;
            transition: all var(--transition);
        }
        .form-group input:focus {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 20px rgba(245, 209, 66, 0.05);
        }
        /* Fix Chrome autofill blue */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: var(--white);
            -webkit-box-shadow: 0 0 0px 1000px #0a0a0a inset;
            transition: background-color 5000s ease-in-out 0s;
        }

        .btn-submit {
            width: 100%;
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 20px;
            font-family: 'Righteous', cursive;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.25em;
            cursor: pointer;
            transition: all var(--transition);
            margin-top: 20px;
        }
        .btn-submit:hover {
            background: var(--white);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.2);
        }

        .msg {
            margin-top: 24px;
            font-size: 0.85rem;
            text-align: center;
            min-height: 20px;
        }
        .msg-error { color: #ff4d4d; }
        .msg-success { color: var(--accent); }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div id="cursorTrail"></div>

    <div class="auth-container">
        <div class="brand">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v20M2 12h20M7 7l10 10M7 17L17 7"/>
            </svg>
            <h1>Smile <em>Dental</em></h1>
        </div>

        <div class="auth-card">
            <div class="tabs">
                <div class="tab active" id="tab-signin">Sign In</div>
                <div class="tab" id="tab-signup">Register</div>
            </div>

            <form id="auth-form">
                <div id="name-group" class="form-group hidden">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" required placeholder="name@luxury.com">
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <button type="submit" class="btn-submit" id="submit-btn">Authenticate</button>
            </form>

            <div id="message" class="msg"></div>
        </div>
    </div>

    <script>
        const authForm = document.getElementById('auth-form');
        const tabSignin = document.getElementById('tab-signin');
        const tabSignup = document.getElementById('tab-signup');
        const nameGroup = document.getElementById('name-group');
        const submitBtn = document.getElementById('submit-btn');
        const messageDiv = document.getElementById('message');

        let mode = 'signin';

        tabSignin.addEventListener('click', () => {
            mode = 'signin';
            tabSignin.classList.add('active');
            tabSignup.classList.remove('active');
            nameGroup.classList.add('hidden');
            submitBtn.innerText = 'Authenticate';
            messageDiv.innerHTML = '';
        });

        tabSignup.addEventListener('click', () => {
            mode = 'signup';
            tabSignup.classList.add('active');
            tabSignin.classList.remove('active');
            nameGroup.classList.remove('hidden');
            submitBtn.innerText = 'Create Account';
            messageDiv.innerHTML = '';
        });

        authForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageDiv.innerHTML = 'Validating credentials...';
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;

            const endpoint = mode === 'signin' ? '/signin' : '/signup';
            const payload = { email, password };
            if (mode === 'signup') payload.name = name;

            try {
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.innerText = data.message;
                    messageDiv.className = 'msg msg-success';
                    if (mode === 'signin') {
                        setTimeout(() => {
                            window.location.href = data.role === 'admin' ? '/admin' : '/';
                        }, 800);
                    } else {
                        setTimeout(() => tabSignin.click(), 1200);
                    }
                } else {
                    messageDiv.innerText = data.error;
                    messageDiv.className = 'msg msg-error';
                }
            } catch (error) {
                messageDiv.innerText = 'System error. Please try again.';
                messageDiv.className = 'msg msg-error';
            }
        });

        // ── CURSOR LOGIC ──────────────────────────────────────
        const cursor = document.getElementById('cursor');
        const trail = document.getElementById('cursorTrail');
        let mouseX = 0, mouseY = 0;
        let trailX = 0, trailY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursor.style.left = mouseX + 'px';
            cursor.style.top  = mouseY + 'px';
        });

        const tick = () => {
            trailX += (mouseX - trailX) * 0.15;
            trailY += (mouseY - trailY) * 0.15;
            trail.style.left = trailX + 'px';
            trail.style.top  = trailY + 'px';
            requestAnimationFrame(tick);
        };
        tick();

        // Hover effects for inputs and buttons
        const interactibles = document.querySelectorAll('input, button, .tab');
        interactibles.forEach(el => {
            el.addEventListener('mouseenter', () => {
                cursor.style.width = '24px';
                cursor.style.height = '24px';
            });
            el.addEventListener('mouseleave', () => {
                cursor.style.width = '10px';
                cursor.style.height = '10px';
            });
        });
    </script>
</body>
</html>
